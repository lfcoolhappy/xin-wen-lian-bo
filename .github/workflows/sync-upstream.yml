name: Sync upstream from author
on:
  schedule:
    # UTC 13:30 = 北京时间 21:30（作者 Actions 约 20:30 更新后）
    - cron: '30 13 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Merge upstream master
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/DuckBurnIncense/xin-wen-lian-bo.git
          git fetch upstream master
          git checkout master
          git merge upstream/master --no-edit
          git push origin master
      - name: Push to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          git remote add gitee "https://oauth2:${GITEE_TOKEN}@gitee.com/lfcoolhappy/xin-wen-lian-bo.git" 2>/dev/null || \
            git remote set-url gitee "https://oauth2:${GITEE_TOKEN}@gitee.com/lfcoolhappy/xin-wen-lian-bo.git"
          git push gitee master
